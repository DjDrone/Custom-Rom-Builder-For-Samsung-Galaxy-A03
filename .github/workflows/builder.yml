name: Custom Rom Builder Samsung Galaxy A03

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:

      GSI:
        description: 'GSI Direct Link'
        required: true
        default: 'https://github.com/naz664/ArrowOS_gsi/releases/download/v2023.10.28/ArrowOS-13.1-arm64_bgN-slim-Unofficial.img.xz'

      NAME:
        description: 'ROM Name'
        required: true
        default: 'ArrowOS-13.1-a032m-arm64-vanilla.7z'

      VERSION:
        description: 'Baseband Version'
        required: true
        default: 'A032MUBS7'

      VENDOR:
        description: 'vendor.img Direct Link'
        required: true
        default: 'https://drive.google.com/uc?export=download&id=1ZcJVYJTB9MiU-joja5GkKMi4gpsn1qmI'

      PRODUCT:
        description: 'product.img Direct Link'
        required: true
        default: 'https://drive.google.com/uc?export=download&id=1DbRliqaggpj8JRewJNfgnI2-KF0SyIgA'

      SYSTEMEXT:
        description: 'system_ext.img Direct Link'
        required: true
        default: 'https://drive.google.com/uc?export=download&id=1HcuFdfKxevwyf8Mj_4u1lJ8weL_WV3XR'

jobs:
  Build:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y \
          zip \
          xz-utils \
          unzip \
          p7zip-full \
          wget \
          tar

      - name: Install lpmake Tools
        run: |
          git clone https://github.com/Exynos-nigg/lpunpack-lpmake-mirror.git lpbinary

          cd lpbinary
          chmod +x install.sh
          bash install.sh

      - name: Prepare Workspace
        run: |
          mkdir -p lpbinary/binary

      - name: Download and Extract GSI
        run: |
          cd lpbinary/binary

          wget -O system.img.xz "${{ github.event.inputs.GSI }}"

          unxz system.img.xz

          mv system.img system.img || true

          if [ ! -f system.img ]; then
            mv *.img system.img
          fi

      - name: Download Partition Images
        run: |
          cd lpbinary/binary

          wget -O vendor.img "${{ github.event.inputs.VENDOR }}"
          wget -O product.img "${{ github.event.inputs.PRODUCT }}"
          wget -O system_ext.img "${{ github.event.inputs.SYSTEMEXT }}"

      - name: Verify Downloaded Files
        run: |
          cd lpbinary/binary

          echo "=== FILE LIST ==="
          ls -lh

          echo "=== VERIFYING FILES ==="

          test -f system.img || exit 1
          test -f vendor.img || exit 1
          test -f product.img || exit 1
          test -f system_ext.img || exit 1

      - name: Build Super Image
        run: |
          cd lpbinary/binary

          SYSTEM_SIZE=$(stat -c%s system.img)
          VENDOR_SIZE=$(stat -c%s vendor.img)
          PRODUCT_SIZE=$(stat -c%s product.img)
          SYSTEMEXT_SIZE=$(stat -c%s system_ext.img)

          ./lpmake \
          --metadata-size 65536 \
          --super-name super \
          --metadata-slots 2 \
          --device super:6763315200 \
          --group main:6761218048 \
          --partition system:readonly:${SYSTEM_SIZE}:main \
          --image system=system.img \
          --partition vendor:readonly:${VENDOR_SIZE}:main \
          --image vendor=vendor.img \
          --partition product:readonly:${PRODUCT_SIZE}:main \
          --image product=product.img \
          --partition system_ext:readonly:${SYSTEMEXT_SIZE}:main \
          --image system_ext=system_ext.img \
          --sparse \
          --output super.img

      - name: Verify Super Image
        run: |
          cd lpbinary/binary
          ls -lh super.img

      - name: Create Odin Flash Package
        run: |
          cd lpbinary/binary

          tar -cvf super.tar super.img
          7z a "${{ github.event.inputs.NAME }}" super.tar

      - name: Upload Release
        uses: softprops/action-gh-release@v1

        with:
          files: lpbinary/binary/${{ github.event.inputs.NAME }}
          name: ${{ github.event.inputs.NAME }}-${{ github.run_id }}
          tag_name: build-${{ github.run_id }}

          body: |
            Device: Samsung Galaxy A03 Core
            Baseband: ${{ github.event.inputs.VERSION }}

            Flash Instructions:
            1. Extract .7z
            2. Open Odin
            3. Put super.tar in AP slot
            4. Flash in Download Mode

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
