name: Custom Rom Builder Samsung Galaxy A03

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:

      GSI:
        description: 'GSI Direct Link'
        required: true
        default: 'https://github.com/naz664/ArrowOS_gsi/releases/download/v2023.10.28/ArrowOS-13.1-arm64_bgN-slim-Unofficial.img.xz'

      NAME:
        description: 'ROM Name'
        required: true
        default: 'ArrowOS-13.1-a032m-arm64-vanilla.7z'

      VERSION:
        description: 'Baseband Version'
        required: true
        default: 'A032MUBS7'

      VENDOR:
        description: 'vendor.img Direct Link'
        required: true
        default: 'https://github.com/DjDrone/Custom-Rom-Builder-For-Samsung-Galaxy-A03/releases/download/build-26337100428/vendor.img'

      PRODUCT:
        description: 'product.img Direct Link'
        required: true
        default: 'https://github.com/DjDrone/Custom-Rom-Builder-For-Samsung-Galaxy-A03/releases/download/build-26337100428/product.img'

      SYSTEMEXT:
        description: 'system_ext.img Direct Link'
        required: true
        default: 'https://github.com/DjDrone/Custom-Rom-Builder-For-Samsung-Galaxy-A03/releases/download/build-26337100428/system_ext.img'

jobs:
  Build:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v3

      # -------------------------
      # Dependencies (FIX INCLUDED)
      # -------------------------
      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            zip \
            xz-utils \
            unzip \
            p7zip-full \
            wget \
            tar \
            android-sdk-libsparse-utils

      # -------------------------
      # Install lpmake tools
      # -------------------------
      - name: Install lpmake Tools
        run: |
          git clone https://github.com/Exynos-nigg/lpunpack-lpmake-mirror.git lpbinary
          cd lpbinary
          chmod +x install.sh
          bash install.sh

      - name: Prepare Workspace
        run: |
          mkdir -p lpbinary/binary

      # -------------------------
      # GSI download
      # -------------------------
      - name: Download and Extract GSI
        run: |
          cd lpbinary/binary

          wget -O system.img.xz "${{ github.event.inputs.GSI }}"
          unxz system.img.xz

          mv system.img system.img || true

          if [ ! -f system.img ]; then
            mv *.img system.img
          fi

      # -------------------------
      # Partition downloads
      # -------------------------
      - name: Download Partition Images
        run: |
          cd lpbinary/binary

          wget -O vendor.img "${{ github.event.inputs.VENDOR }}"
          wget -O product.img "${{ github.event.inputs.PRODUCT }}"
          wget -O system_ext.img "${{ github.event.inputs.SYSTEMEXT }}"

      # -------------------------
      # DEBUG (important safety check)
      # -------------------------
      - name: Verify Raw Files
        run: |
          cd lpbinary/binary

          echo "=== FILE LIST ==="
          ls -lh

          echo "=== FILE TYPE CHECK ==="
          file system.img vendor.img product.img system_ext.img

      # -------------------------
      # FIX: Convert RAW → SPARSE (CRITICAL FIX)
      # -------------------------
      - name: Convert Images to Sparse Format
        run: |
          cd lpbinary/binary

          echo "=== Converting images using img2simg ==="

          mv system.img system_raw.img
          mv vendor.img vendor_raw.img
          mv product.img product_raw.img
          mv system_ext.img system_ext_raw.img

          img2simg system_raw.img system.img
          img2simg vendor_raw.img vendor.img
          img2simg product_raw.img product.img
          img2simg system_ext_raw.img system_ext.img

          echo "=== Converted files ==="
          file system.img vendor.img product.img system_ext.img

      # -------------------------
      # Build SUPER IMAGE
      # -------------------------
      - name: Build Super Image
        run: |
          cd lpbinary/binary

          SYSTEM_SIZE=$(stat -c%s system.img)
          VENDOR_SIZE=$(stat -c%s vendor.img)
          PRODUCT_SIZE=$(stat -c%s product.img)
          SYSTEMEXT_SIZE=$(stat -c%s system_ext.img)

          ./lpmake \
            --metadata-size 65536 \
            --super-name super \
            --metadata-slots 2 \
            --device super:6763315200 \
            --group main:6761218048 \
            --partition system:readonly:${SYSTEM_SIZE}:main \
            --image system=system.img \
            --partition vendor:readonly:${VENDOR_SIZE}:main \
            --image vendor=vendor.img \
            --partition product:readonly:${PRODUCT_SIZE}:main \
            --image product=product.img \
            --partition system_ext:readonly:${SYSTEMEXT_SIZE}:main \
            --image system_ext=system_ext.img \
            --sparse \
            --output super.img

      # -------------------------
      # VERIFY OUTPUT
      # -------------------------
      - name: Verify Super Image
        run: |
          cd lpbinary/binary
          ls -lh super.img

      # -------------------------
      # PACKAGING
      # -------------------------
      - name: Create Odin Flash Package
        run: |
          cd lpbinary/binary
          tar -cvf super.tar super.img
          7z a "${{ github.event.inputs.NAME }}" super.tar

      # -------------------------
      # RELEASE
      # -------------------------
      - name: Upload Release
        uses: softprops/action-gh-release@v1
        with:
          files: lpbinary/binary/${{ github.event.inputs.NAME }}
          name: ${{ github.event.inputs.NAME }}-${{ github.run_id }}
          tag_name: build-${{ github.run_id }}
          body: |
            Device: Samsung Galaxy A03 Core
            Baseband: ${{ github.event.inputs.VERSION }}

            Flash Instructions:
            1. Extract .7z
            2. Open Odin
            3. Put super.tar in AP slot
            4. Flash in Download Mode
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
